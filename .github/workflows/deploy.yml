name: Deploy to IONOS Webspace

# Es wird NICHT gebaut: die fertige dist/ kommt bereits fertig aus dem Repo
# (lokal mit den Smoobu-Preisen gebaut, siehe villa.sh / DEPLOY.md). Hier wird
# nur noch per rsync über SSH auf den IONOS-Webspace synchronisiert.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy per rsync über SSH (Passwort-Auth)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: sshpass installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Auf IONOS Webspace synchronisieren
        env:
          FTP_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          FTP_USERNAME: ${{ secrets.SSH_USERNAME }}
          FTP_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
        run: |
          sshpass -p "$SSH_PASSWORD" rsync -avzr --delete \
            --exclude=".git*" \
            -e "ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=no" \
            dist/ "${SSH_USERNAME}@${SSH_HOST}:${SSH_REMOTE_PATH}"
