name: Deploy dist to IONOS

# Läuft bei jedem Push nach main – und manuell über "Run workflow".
# Es wird NICHT gebaut: die fertige dist/ kommt bereits fertig aus dem Repo
# (lokal mit den Smoobu-Preisen gebaut). Hier wird nur noch hochgeladen.
on:
  push:
    branches: [main]
    paths: ['dist/**']
  workflow_dispatch:

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lädt den Inhalt von dist/ per FTPS in den IONOS-Webspace (inkrementell,
      # inkl. versteckter Dateien wie .htaccess). Nicht zum Projekt gehörende
      # Dateien auf dem Server werden NICHT gelöscht.
      - name: Deploy nach IONOS (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
