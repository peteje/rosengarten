name: Deploy to IONOS Webspace

# Es wird NICHT gebaut: die fertige dist/ kommt bereits fertig aus dem Repo
# (lokal mit den Smoobu-Preisen gebaut, siehe villa.sh / DEPLOY.md). Hier wird
# nur noch per rsync über SSH auf den IONOS-Webspace synchronisiert.
#
# Nutzt die vorhandenen Repo-Secrets (Namen wie eingerichtet):
#   FTP_SERVER      -> SSH-Host
#   SSL_PORT        -> SSH-Port
#   FTP_USERNAME    -> SSH-Benutzer
#   FTP_PASSWORD    -> SSH-Passwort
#   FTP_SERVER_DIR  -> Zielordner auf dem Webspace
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy per rsync über SSH (Passwort-Auth)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: sshpass installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Auf IONOS Webspace synchronisieren
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          SSL_PORT: ${{ secrets.SSL_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sshpass -p "$FTP_PASSWORD" rsync -avzr --delete \
            --exclude=".git*" \
            -e "ssh -p ${SSL_PORT:-22} -o StrictHostKeyChecking=no" \
            dist/ "${FTP_USERNAME}@${FTP_SERVER}:${FTP_SERVER_DIR}"
