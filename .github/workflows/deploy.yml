name: Deploy to IONOS Webspace

# Es wird NICHT gebaut: die fertige dist/ kommt bereits fertig aus dem Repo
# (lokal mit den Smoobu-Preisen gebaut, siehe villa.sh / DEPLOY.md).
#
# Upload per SFTP mit lftp (mirror). Der IONOS-Webspace-Zugang ist auf SFTP
# beschränkt (rssh, "Allowed commands: sftp") – deshalb SFTP statt rsync/SSH.
#
# Genutzte Repo-Secrets (Namen wie eingerichtet):
#   FTP_SERVER      -> SFTP-Host
#   SSL_PORT        -> SFTP-Port (bei IONOS meist 22)
#   FTP_USERNAME    -> SFTP-Benutzer
#   FTP_PASSWORD    -> SFTP-Passwort
#   FTP_SERVER_DIR  -> Zielordner auf dem Webspace
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy per SFTP (lftp mirror)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: lftp installieren
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Auf IONOS Webspace synchronisieren (SFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          SSL_PORT: ${{ secrets.SSL_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          export LFTP_PASSWORD="$FTP_PASSWORD"
          lftp -u "$FTP_USERNAME" --env-password -p "${SSL_PORT:-22}" "sftp://$FTP_SERVER" -e "set sftp:auto-confirm yes; set net:timeout 20; set net:max-retries 2; mirror -R --delete --verbose ./dist/ \"$FTP_SERVER_DIR\"; bye"
